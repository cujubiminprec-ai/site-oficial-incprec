services:
  mysql:
    image: mysql:8.4
    container_name: inprec-mysql-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: inprec
      MYSQL_USER: inprec
      MYSQL_PASSWORD: inprec_dev_password
    ports:
      - "3306:3306"
    volumes:
      - inprec_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  inprec_mysql_data:
